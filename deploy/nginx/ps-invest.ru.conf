# /etc/nginx/sites-available/ps-invest.ru
# SSL: certbot --nginx -d ps-invest.ru -d www.ps-invest.ru
# Wildcard: certbot certonly --manual --preferred-challenges dns -d ps-invest.ru -d '*.ps-invest.ru'

upstream profstal_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ps-invest.ru www.ps-invest.ru *.ps-invest.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ps-invest.ru www.ps-invest.ru *.ps-invest.ru;

    ssl_certificate     /etc/letsencrypt/live/ps-invest.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ps-invest.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    # www → apex
    if ($host = www.ps-invest.ru) {
        return 301 https://ps-invest.ru$request_uri;
    }

    location / {
        proxy_pass http://profstal_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        proxy_pass http://profstal_app;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
