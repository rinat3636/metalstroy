# VPS Reg.ru: docker compose up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - app-data:/app/data
      - app-catalog:/app/src/data
      - app-images:/app/public/assets/catalog-images
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
  app-catalog:
  app-images:
